name: SonarCloud analysis

on: 
  workflow_run:
    workflows: [CI test report]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      has-artifacts: ${{ steps.check.outputs.has-artifacts }}
    steps:
      - name: Check for coverage artifact
        id: check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const hasCoverage = artifacts.data.artifacts.some(a => a.name === 'coverage-report');
            core.setOutput('has-artifacts', hasCoverage);
            return hasCoverage;

  sonarqube:
    needs: check-artifacts
    if: needs.check-artifacts.outputs.has-artifacts == 'true'
    runs-on: ubuntu-latest
    steps:

    - name: echo event
      run: cat $GITHUB_EVENT_PATH

    - name: Download PR number artifact
      if: github.event.workflow_run.event == 'pull_request'
      uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295 # v9
      with:
        workflow: CI test report
        run_id: ${{ github.event.workflow_run.id }}
        name: PR_NUMBER

    - name: Read PR_NUMBER.txt
      if: github.event.workflow_run.event == 'pull_request'
      id: pr_number
      uses: juliangruber/read-file-action@b549046febe0fe86f8cb4f93c24e284433f9ab58 # v1.1.7
      with:
        path: ./PR_NUMBER.txt

    - name: Request GitHub API for PR data
      if: github.event.workflow_run.event == 'pull_request'
      uses: octokit/request-action@02f5e7c637a73a3b12ed81015fa7fb5f11cc5d7d # v2.x
      id: get_pr_data
      with:
        route: GET /repos/{full_name}/pulls/{number}
        number: ${{ steps.pr_number.outputs.content }}
        full_name: ${{ github.event.repository.full_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

    - name: Checkout base branch
      if: github.event.workflow_run.event == 'pull_request'
      run: |
        git remote add upstream ${{ github.event.repository.clone_url }}
        git fetch upstream
        git checkout -B ${{ fromJson(steps.get_pr_data.outputs.data).base.ref }} upstream/${{ fromJson(steps.get_pr_data.outputs.data).base.ref }}
        git checkout ${{ github.event.workflow_run.head_sha }}
        git clean -ffdx && git reset --hard HEAD

    - name: Download coverage artifact
      uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295 # v9
      with:
        workflow: CI test report
        run_id: ${{ github.event.workflow_run.id }}
        name: coverage-report
        use_unzip: true
        
    - name: Fix Go module paths in coverage
      run: |
        sed -i 's|github.com/nephio-project/porch|.|g' coverage.out
        
    - name: SonarQube Scan on PR
      if: github.event.workflow_run.event == 'pull_request'
      uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args:
          -Dsonar.projectKey=nephio-project_porch
          -Dsonar.organization=nephio-project
          -Dproject.settings=sonar-project.properties
          -Dsonar.pullrequest.key=${{ fromJson(steps.get_pr_data.outputs.data).number }} 
          -Dsonar.pullrequest.branch=${{ fromJson(steps.get_pr_data.outputs.data).head.ref }} 
          -Dsonar.pullrequest.base=${{ fromJson(steps.get_pr_data.outputs.data).base.ref }}

    - name: SonarCloud Scan on push
      if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.event.repository.full_name
      uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args:
          -Dsonar.projectKey=nephio-project_porch
          -Dsonar.organization=nephio-project
          -Dproject.settings=sonar-project.properties