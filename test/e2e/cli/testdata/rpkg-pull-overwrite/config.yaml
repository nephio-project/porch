usesPorchTestRepo: true
commands:
  - args:
    - porchctl
    - repo
    - register
    - --namespace=rpkg-pull-overwrite
    - --name=git
    - --repo-basic-password=secret
    - --repo-basic-username=nephio
    - http://gitea.gitea.svc.cluster.local:3000/nephio/porch-test
  - args:
    - porchctl
    - rpkg
    - init
    - --namespace=rpkg-pull-overwrite
    - --repository=git
    - --workspace=v1
    - test-package
    stdout: |
      git.test-package.v1 created
  - args:
    - porchctl
    - rpkg
    - pull
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
  - args:
    - sed
    - -i
    - "s/sample description/updated description/"
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package/Kptfile
  - args:
    - porchctl
    - rpkg
    - push
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
    stdout: |
      git.test-package.v1 pushed
  - args:
    - porchctl
    - rpkg
    - pull
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
    # no error
  - args:
    - porchctl
    - rpkg
    - propose
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    stdout: |
      git.test-package.v1 proposed
  - args:
    - porchctl
    - rpkg
    - approve
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    stdout: |
      git.test-package.v1 approved
  - args:
    - porchctl
    - rpkg
    - copy
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v1
    - --workspace=v2
    stdout: |
      git.test-package.v2 created
  - args:
    - porchctl
    - rpkg
    - pull
    - --namespace=rpkg-pull-overwrite
    - git.test-package.v2
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
    # no error
  - args:
    - porchctl
    - rpkg
    - init
    - --namespace=rpkg-pull-overwrite
    - --repository=git
    - --workspace=v1
    - test-package-2
    stdout: |
      git.test-package-2.v1 created
  - args:
    - porchctl
    - rpkg
    - pull
    - --namespace=rpkg-pull-overwrite
    - git.test-package-2.v1
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
    exitCode: 1
    stderr: | # extra space at the end because of a bug in kpt pkg/lib/errors
      Error: directory "/tmp/porch-e2e/rpkg-pull-overwrite-git.test-package" already exists, please delete the directory and retry; you may overwrite the directory with --force 
  - args:
    - porchctl
    - rpkg
    - pull
    - --namespace=rpkg-pull-overwrite
    - --force
    - git.test-package-2.v1
    - /tmp/porch-e2e/rpkg-pull-overwrite-git.test-package
    # no error
