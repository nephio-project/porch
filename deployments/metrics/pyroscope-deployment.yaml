kind: ServiceAccount
apiVersion: v1
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      serviceAccountName: pyroscope
      containers:
        - name: pyroscope
          image: docker.io/grafana/pyroscope:latest # kpt-set: ${pyroscope-image}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4040
              name: ingest
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: porch-monitoring # kpt-set: ${namespace}
spec:
  ports:
    - port: 4040
      protocol: TCP
      targetPort: 4040
      name: ingest
  selector:
    app: pyroscope
