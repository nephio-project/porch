apiVersion: v1
kind: PodTemplate
metadata:
  name: base-pod-template
  namespace: porch-fn-system
template:
  metadata:
    annotations:
      cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
  spec:
    initContainers:
      - name: copy-wrapper-server
        image: docker.io/nephio/porch-wrapper-server:latest
        command:
          - cp
          - -a
          - /home/nonroot/wrapper-server/.
          - /wrapper-server-tools
        volumeMounts:
          - name: wrapper-server-tools
            mountPath: /wrapper-server-tools
        imagePullPolicy: IfNotPresent
    containers:
      - name: function
        image: image-replaced-by-kpt-func-image
        command:
          - /wrapper-server-tools/wrapper-server
        env:
          - name: OTEL_METRICS_EXPORTER
            value: prometheus
          - name: OTEL_TRACES_EXPORTER
            value: none
          - name: OTEL_EXPORTER_PROMETHEUS_HOST
            value: 0.0.0.0
        readinessProbe:
          exec:
            command: [ "/wrapper-server-tools/grpc-health-probe", "-addr", "localhost:9446" ]
        livenessProbe:
          exec:
            command: [ "/wrapper-server-tools/grpc-health-probe", "-addr", "localhost:9446" ]
        volumeMounts:
          - name: wrapper-server-tools
            mountPath: /wrapper-server-tools
        imagePullPolicy: IfNotPresent
    volumes:
      - name: wrapper-server-tools
        emptyDir: { }
---
apiVersion: config.porch.kpt.dev/v1alpha1
kind: ServiceTemplate
metadata:
  name: base-service-template
  namespace: porch-fn-system
template:
  spec:
    ports:
      - port: 9446
        protocol: TCP
        targetPort: 9446
    selector:
      fn.kpt.dev/image: to-be-replaced
    type: ClusterIP
