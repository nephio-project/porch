kind: ServiceAccount
apiVersion: v1
metadata:
  name: porch-fn-runner
  namespace: porch-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: function-runner
  namespace: porch-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: function-runner
  template:
    metadata:
      labels:
        app: function-runner
    spec:
      serviceAccountName: porch-fn-runner
      containers:
        - name: function-runner
          image: docker.io/nephio/porch-function-runner:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          command:
            - /home/nonroot/server
            - --pod-namespace=porch-fn-system
            - --max-request-body-size=6291456 # Keep this in sync with porch-server's corresponding argument
            - --max-parallel-pods-per-function=2
            - --max-waitlist-length=1
            - --warm-up-pod-cache=true
            - --functions=/home/nonroot/functions
          env:
            - name: WRAPPER_SERVER_IMAGE
              value: docker.io/nephio/porch-wrapper-server:latest
            # Uncomment to enable memory and cpu profiling with pyroscope
            #- name: PYROSCOPE_SERVER
            #  value: "http://pyroscope.porch-monitoring.svc.cluster.local:4040"
            #- name: PYROSCOPE_APP_NAME
            #  value: porch-function-runner
            #- name: PYROSCOPE_LOGS_ENABLED
            #  value: "false"
            - name: OTEL_METRICS_EXPORTER
              value: "prometheus"
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: 0.0.0.0
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: "9464" # Default value, showing for visibility
            - name: OTEL_TRACES_EXPORTER
              value: none
            - name: OTEL_SERVICE_NAME
              value: porch-function-runner
          ports:
            - containerPort: 9445
            - containerPort: 9464
              name: metrics
          # Add grpc readiness probe to ensure the cache is ready
          readinessProbe:
            exec:
              command:
                - /home/nonroot/grpc-health-probe
                - -addr
                - localhost:9445
          resources:
            requests:
              memory: "64Mi"
              cpu: "125m"
---
apiVersion: v1
kind: Service
metadata:
  name: function-runner
  namespace: porch-system
spec:
  selector:
    app: function-runner
  ports:
    - port: 9445
      protocol: TCP
      targetPort: 9445
      name: grpc
    - port: 9464
      protocol: TCP
      targetPort: 9464
      name: metrics
