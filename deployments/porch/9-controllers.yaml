kind: ServiceAccount
apiVersion: v1
metadata:
  name: porch-controllers
  namespace: porch-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porch-controllers
  namespace: porch-system
  labels:
    k8s-app: porch-controllers
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: porch-controllers
  template:
    metadata:
      labels:
        k8s-app: porch-controllers
    spec:
      serviceAccountName: porch-controllers
      volumes:
      - name: cache-volume
        emptyDir: {}
      containers:
      - name: porch-controllers
        # Update to the image of your porch-controllers build.
        image: docker.io/nephio/porch-controllers:latest
        imagePullPolicy: IfNotPresent
        args:
        - --repositories.cache-type=DB
        - --repositories.create-v1alpha2-rpkg=false
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
        volumeMounts:
        - name: cache-volume
          mountPath: /cache
        env:
        - name: ENABLE_PACKAGEVARIANTS
          value: "true"
        - name: ENABLE_PACKAGEVARIANTSETS
          value: "true"
        - name: ENABLE_REPOSITORIES
          value: "true"
        - name: GIT_CACHE_DIR
          value: "/cache"
        - name: OTEL_SERVICE_NAME
          value: porch-controllers
        - name: OTEL_METRICS_EXPORTER
          value: "prometheus"
        - name: OTEL_EXPORTER_PROMETHEUS_HOST
          value: "0.0.0.0"
        - name: OTEL_EXPORTER_PROMETHEUS_PORT
          value: "9464" # Default value, showing for visibility
        - name: OTEL_TRACES_EXPORTER
          value: none
        envFrom:
        - configMapRef:
            name: porch-db-config
            optional: true
        - secretRef:
            name: porch-db-secret
            optional: true
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
            cpu: 1000m
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3            
